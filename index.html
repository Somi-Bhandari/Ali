<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Life Advisor</title>

<script src="https://js.puter.com/v2/"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
height:100vh;
}

.app{
width:900px;
display:flex;
flex-direction:column;
}

.header{
padding:20px;
background:#020617;
text-align:center;
font-size:22px;
font-weight:bold;
}

.chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
margin-bottom:20px;
}

.user{
text-align:right;
}

.assistant{
background:#020617;
padding:15px;
border-radius:10px;
max-width:70%;
}

.input-box{
display:flex;
padding:15px;
background:#020617;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:8px;
background:#0ea5e9;
color:white;
cursor:pointer;
}

.video{
margin-top:10px;
}

.reminder{
margin-top:15px;
background:#1e293b;
padding:10px;
border-radius:8px;
}

.tracker{
margin-top:10px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
Wise Advisor — Future Doctor Alisha
</div>

<div id="chat" class="chat"></div>

<div class="input-box">
<input id="input" placeholder="Ask anything...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

const YOUTUBE_API="AIzaSyD3_pVIFtixs4fL72n0QNpSSu-x-Q1ce9o";

const memory={
name:"Alisha Kunwar",
dream:"becoming a doctor",
goal:"pass CEE exam"
};

let history=[
{
role:"system",
content:`
You are a life advisor for Alisha Kunwar.

Her dream is becoming a doctor.

Guide her with discipline and wisdom.

Detect emotions:
sad
demotivated
confused
happy

Respond with encouragement and advice.
`
}
];

function addMessage(text,type){

const chat=document.getElementById("chat");

const div=document.createElement("div");

div.className="message "+type;

div.innerHTML=`<div class="${type}">${text}</div>`;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function detectEmotion(text){

text=text.toLowerCase();

if(text.includes("sad")||text.includes("cry")||text.includes("depressed"))
return "sad";

if(text.includes("tired")||text.includes("demotivated"))
return "demotivated";

if(text.includes("confused"))
return "confused";

return "normal";

}

async function searchYouTube(query){

const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&key=${YOUTUBE_API}&maxResults=1&type=video`;

const res=await fetch(url);

const data=await res.json();

const videoId=data.items[0].id.videoId;

return videoId;

}

function createVideoEmbed(id){

return `
<div class="video">
<iframe width="100%" height="300"
src="https://www.youtube.com/embed/${id}"
frameborder="0" allowfullscreen>
</iframe>
</div>
`;

}

function saveStudy(){

let today=new Date().toDateString();

let tracker=JSON.parse(localStorage.getItem("studyTracker")||"{}");

tracker[today]=(tracker[today]||0)+1;

localStorage.setItem("studyTracker",JSON.stringify(tracker));

return tracker[today];

}

function setReminder(){

setTimeout(()=>{

alert("Reminder: Study time for your dream of becoming a doctor!");

},3600000);

}

async function send(){

const input=document.getElementById("input");

const text=input.value.trim();

if(!text)return;

input.value="";

addMessage(text,"user");

history.push({role:"user",content:text});

const emotion=detectEmotion(text);

let response=await puter.ai.chat(history);

let reply=response.message.content;

history.push({role:"assistant",content:reply});

addMessage(reply,"assistant");

const videoId=await searchYouTube(text);

const embed=createVideoEmbed(videoId);

addMessage(embed,"assistant");

const studyCount=saveStudy();

addMessage(
`Daily Study Tracker: You studied ${studyCount} times today.`,
"assistant"
);

if(emotion==="sad"||emotion==="demotivated"){

addMessage(
"Remember: Your dream of becoming a doctor is bigger than temporary feelings.",
"assistant"
);

}

setReminder();

}

document.getElementById("input").addEventListener("keypress",function(e){
if(e.key==="Enter")send();
});

</script>

</body>
</html>
