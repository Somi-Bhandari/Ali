<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Life Advisor</title>

<script src="https://js.puter.com/v2/"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
height:100vh;
}

.app{
width:900px;
display:flex;
flex-direction:column;
}

.header{
padding:20px;
background:#020617;
text-align:center;
font-size:22px;
font-weight:bold;
}

.chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
margin-bottom:20px;
}

.user{
text-align:right;
}

.assistant{
background:#020617;
padding:15px;
border-radius:10px;
max-width:70%;
}

.input-box{
display:flex;
padding:15px;
background:#020617;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:8px;
background:#0ea5e9;
color:white;
cursor:pointer;
}

.video{
margin-top:10px;
}

.reminder{
margin-top:15px;
background:#1e293b;
padding:10px;
border-radius:8px;
}

.tracker{
margin-top:10px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
Wise Advisor — Future Doctor Alisha
</div>

<div id="chat" class="chat"></div>

<div class="input-box">
<input id="input" placeholder="Ask anything...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

const YOUTUBE_API="AIzaSyD3_pVIFtixs4fL72n0QNpSSu-x-Q1ce9o";

const memory={
name:"Alisha Kunwar",
dream:"becoming a doctor",
goal:"pass CEE exam"
};

let history=[
{
role:"system",
content:`
You are a life advisor for Alisha Kunwar.

Her dream is becoming a doctor.

Guide her with discipline and wisdom.

Detect emotions:
sad
demotivated
confused
happy

Respond with encouragement and advice.
`
}
];

function addMessage(text,type){

const chat=document.getElementById("chat");

const div=document.createElement("div");

div.className="message "+type;

div.innerHTML=`<div class="${type}">${text}</div>`;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function detectEmotion(text){

text=text.toLowerCase();

if(text.includes("sad")||text.includes("cry")||text.includes("depressed"))
return "sad";

if(text.includes("tired")||text.includes("demotivated"))
return "demotivated";

if(text.includes("confused"))
return "confused";

return "normal";

}

async function searchYouTube(query){

const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&key=${YOUTUBE_API}&maxResults=1&type=video`;

const res=await fetch(url);

const data=await res.json();

const videoId=data.items[0].id.videoId;

return videoId;

}

function createVideoEmbed(id){

return `
<div class="video">
<iframe width="100%" height="300"
src="https://www.youtube.com/embed/${id}"
frameborder="0" allowfullscreen>
</iframe>
</div>
`;

}

function saveStudy(){

let today=new Date().toDateString();

let tracker=JSON.parse(localStorage.getItem("studyTracker")||"{}");

tracker[today]=(tracker[today]||0)+1;

localStorage.setItem("studyTracker",JSON.stringify(tracker));

return tracker[today];

}

function setReminder(){

setTimeout(()=>{

alert("Reminder: Study time for your dream of becoming a doctor!");

},3600000);

}

async function send(){

const input=document.getElementById("input");

const text=input.value.trim();

if(!text)return;

input.value="";

addMessage(text,"user");

history.push({role:"user",content:text});

const emotion=detectEmotion(text);

let response=await puter.ai.chat(history);

let reply=response.message.content;

history.push({role:"assistant",content:reply});

addMessage(reply,"assistant");

const videoId=await searchYouTube(text);

const embed=createVideoEmbed(videoId);

addMessage(embed,"assistant");

const studyCount=saveStudy();

addMessage(
`Daily Study Tracker: You studied ${studyCount} times today.`,
"assistant"
);

if(emotion==="sad"||emotion==="demotivated"){

addMessage(
"Remember: Your dream of becoming a doctor is bigger than temporary feelings.",
"assistant"
);

}

setReminder();

}

document.getElementById("input").addEventListener("keypress",function(e){
if(e.key==="Enter")send();
});

</script>

</body>
</html>



<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wise Advisor</title>

<script src="https://js.puter.com/v2/"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
padding:40px 20px;
}

.container{
max-width:800px;
width:100%;
background:#0f172a;
border-radius:20px;
padding:30px;
}

.banner{
background:#0ea5e9;
padding:12px;
border-radius:10px;
text-align:center;
margin-bottom:20px;
}

.chat{
background:#020617;
padding:20px;
border-radius:12px;
min-height:120px;
line-height:1.6;
}

.input-box{
display:flex;
gap:10px;
margin-top:20px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
}

button{
background:#0ea5e9;
border:none;
padding:12px 20px;
border-radius:10px;
color:white;
cursor:pointer;
}

.typing{
display:none;
color:#38bdf8;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Wise Life Advisor</h2>

<div class="banner">
Future Doctor : Alisha Kunwar
</div>

<div id="typing" class="typing">Advisor is thinking...</div>

<div id="chat" class="chat">
Hello Alisha. Every decision you make today shapes the doctor you will become tomorrow.
</div>

<div class="input-box">
<input id="userInput" placeholder="Ask anything...">
<button onclick="askAdvisor()">Ask</button>
</div>

</div>

<script>

const memory = {
name:"Alisha Kunwar",
dream:"becoming a doctor by passing the CEE exam",
school:"Shree Kinder Garden Academy",
gpa:"3.9",
goal:"make parents proud"
};

const systemPrompt = `
You are a wise life mentor for Alisha Kunwar.

ABOUT HER
She scored GPA 3.9 in SEE.
She is a science student.
Her dream is becoming a doctor by passing the CEE exam.

Her father works very hard to support her education.

MISSION
Guide her to stay disciplined and focused on becoming a doctor.

RULES
Give clear advice.
Avoid long paragraphs.
Encourage discipline and study habits.
If she asks about decisions guide based on her dream.
`;

let history = [
{role:"system",content:systemPrompt}
];

function generateMotivation(){

const quotes = [

"Great doctors are built through discipline long before they wear the white coat.",

"Every hour you study today becomes someone's life you save tomorrow.",

"Your father's hard work is the fuel for your dream.",

"The future Doctor Alisha is built by the small decisions you make today.",

"One focused day can bring you closer to your dream than weeks of distraction.",

"Your dream is bigger than temporary laziness.",

"Success in CEE begins with discipline today."

];

return quotes[Math.floor(Math.random()*quotes.length)];
}

function youtubeLink(query){

const search = encodeURIComponent(query);

return `https://www.youtube.com/results?search_query=${search}`;

}

async function askAdvisor(){

const input = document.getElementById("userInput");
const chat = document.getElementById("chat");
const typing = document.getElementById("typing");

const message = input.value.trim();

if(!message) return;

input.value="";

typing.style.display="block";

history.push({
role:"user",
content:message
});

try{

const response = await puter.ai.chat(history);

const reply = response.message.content;

history.push({
role:"assistant",
content:reply
});

typing.style.display="none";

const motivation = generateMotivation();

const video = youtubeLink(message);

chat.innerHTML = `
<b>Advisor:</b><br><br>
${reply}

<br><br>
<b>Motivation:</b><br>
${motivation}

<br><br>
<b>Helpful Video:</b><br>
<a href="${video}" target="_blank">Watch related video</a>
`;

}catch(e){

typing.style.display="none";
chat.innerHTML="AI connection error.";

}

}

document.getElementById("userInput")
.addEventListener("keypress",function(e){
if(e.key==="Enter") askAdvisor();
});

</script>

</body>
</html>
