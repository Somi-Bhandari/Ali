<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice AI Advisor for Alisha</title>
<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh;}
.container{width:900px;display:flex;flex-direction:column;background:#020617;border-radius:20px;padding:20px;}
.header{text-align:center;font-size:24px;margin-bottom:15px;}
.chat{flex:1;overflow-y:auto;height:400px;padding:10px;border:1px solid #0ea5e9;border-radius:15px;margin-bottom:15px;}
.message{margin:10px 0;}
.user{text-align:right;}
.assistant{background:#1e293b;padding:10px;border-radius:10px;max-width:70%;}
.input-box{display:flex;gap:10px;}
input{flex:1;padding:12px;border-radius:8px;border:none;background:#1e293b;color:white;}
button{padding:12px 15px;border:none;border-radius:8px;background:#0ea5e9;color:white;cursor:pointer;}
.video{margin-top:10px;}
</style>
</head>
<body>
<div class="container">
  <div class="header">AI Life & Study Advisor — Alisha</div>
  <div id="chat" class="chat"></div>
  
  <div class="input-box">
    <input id="textInput" placeholder="Type here (text response only)">
    <button onclick="sendText()">Send</button>
    <button onclick="startVoice()">🎤 Voice Mode</button>
  </div>
</div>

<script>
const memory = {name:"Alisha",dream:"becoming a doctor",goal:"pass CEE exam"};
let studyCount = 0;

function addMessage(msg,type){
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className="message "+type;
  div.innerHTML=`<div class="${type}">${msg}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ----- Text input mode -----
function sendText(){
  const input = document.getElementById("textInput");
  const text = input.value.trim();
  if(!text) return;
  input.value="";
  addMessage(text,"user");
  const reply = generateReply(text);
  addMessage(reply,"assistant");
}

// ----- Voice mode -----
async function startVoice(){
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  
  recognition.start();
  recognition.onresult = async function(event){
    const speechText = event.results[0][0].transcript;
    addMessage(speechText,"user");
    
    // AI generates reply
    const reply = await generateReply(speechText);
    
    // Speak response
    const utter = new SpeechSynthesisUtterance(reply);
    utter.lang = detectLanguage(speechText);
    utter.rate = 1;
    speechSynthesis.speak(utter);
    
    addMessage("[Voice response played]","assistant");
  };
  
  recognition.onerror = function(e){
    console.error(e);
    addMessage("[Voice recognition error]","assistant");
  };
}

// ----- Language detection -----
function detectLanguage(text){
  // Simple detection based on Unicode ranges
  if(/[^\u0000-\u007F]/.test(text)) return "ne-NP"; // Nepali
  return "en-US";
}

// ----- Generate AI reply -----
async function generateReply(input){
  const q = input.toLowerCase();
  
  // Simple topic-based YouTube video search
  let videoHTML = "";
  if(q.includes("biology")||q.includes("chemistry")||q.includes("physics")||q.includes("study")){
    const videoId = await fetchYouTube(input);
    if(videoId) videoHTML = `<div class="video"><iframe width="100%" height="200" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe></div>`;
  }
  
  let reply="";
  
  // Motivation & guidance logic
  if(q.includes("sad")||q.includes("tired")||q.includes("demotivated")){
    reply = `Alisha, I know it can be hard, but every small step brings you closer to your dream of ${memory.dream}. Keep going!`;
  } else if(q.includes("should i")||q.includes("can i")){
    reply = `Ask yourself: "Does this help my goal of ${memory.goal}?" If yes, do it. If not, stay disciplined.`;
  } else if(q.includes("time")||q.includes("schedule")||q.includes("routine")){
    reply = `Managing time well is key. Try studying in focused blocks and take short breaks.`;
  } else {
    reply = `I heard you, Alisha. Remember your dream of ${memory.dream} and take one step at a time.`;
  }
  
  // Increment study tracker
  studyCount++;
  reply += `<br>Daily study sessions today: ${studyCount}`;
  
  return reply + videoHTML;
}

// ----- YouTube search (API key required) -----
async function fetchYouTube(query){
  const API_KEY = "YOUR_YOUTUBE_API_KEY"; // <-- Replace with your key
  try{
    const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&key=${API_KEY}&maxResults=1&type=video`);
    const data = await res.json();
    if(data.items && data.items.length>0) return data.items[0].id.videoId;
  } catch(e){console.error(e);}
  return null;
}

</script>
</body>
</html>
